name: Daily AI Blog Automation

on:
  schedule:
    # Runs at 02:30 UTC (8:00 AM IST)
    - cron: '30 2 * * *'
    # Runs at 14:30 UTC (8:00 PM IST)
    - cron: '30 14 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  automate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger AI Blog Automation
        run: |
          curl -X GET "https://YOUR_DEPLOYED_URL/api/automate" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
